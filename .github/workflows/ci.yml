name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Code format & lint ────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Rust stable (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Unit tests - Windows · Linux · macOS ─────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
        with:
          key: ${{ matrix.os }}

      - name: Run unit tests
        run: cargo test --all-targets -- --nocapture

      - name: Verify release build compiles
        run: cargo build --release

  # ── Auto-version + tag + release (push to main only) ─────────────────────────
  #
  # Reads conventional commits since the last tag, computes the next semver,
  # bumps Cargo.toml, commits, creates an annotated tag, and creates a GitHub
  # Release (which triggers release.yml to build and upload the binaries).
  #
  # Skip conditions:
  #   - The commit itself is a chore(release) bump (prevents infinite loops).
  #   - The commit was made by the github-actions bot.
  #   - No releasable commits found (docs, ci, chore only).
  auto-release:
    name: Auto Version & Release
    needs: [lint, test]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore(release)') &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0 # full history needed to walk tags

      # ── 1. Determine bump type from Conventional Commits ─────────────────────
      - name: Determine version bump
        id: bump
        run: |
          set -euo pipefail

          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          [ -z "$LATEST_TAG" ] && LATEST_TAG="v0.0.0"
          echo "Latest tag: $LATEST_TAG"

          if git rev-parse "${LATEST_TAG}" >/dev/null 2>&1; then
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --format="%s %b")
          else
            COMMITS=$(git log --format="%s %b")
          fi

          echo "Commits since ${LATEST_TAG}:"
          echo "$COMMITS"

          BUMP="none"
          if echo "$COMMITS" | grep -qE '^[a-z]+(\([^)]*\))?!:|BREAKING.CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\([^)]*\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^(fix|perf|refactor|security)(\([^)]*\))?:'; then
            BUMP="patch"
          fi

          echo "Bump type: $BUMP"
          echo "bump=${BUMP}"           >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

      # ── 2. Compute the new version number ────────────────────────────────────
      - name: Compute new version
        id: version
        if: steps.bump.outputs.bump != 'none'
        run: |
          LATEST="${{ steps.bump.outputs.latest_tag }}"
          VER="${LATEST#v}"
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH=$(echo "$VER" | cut -d. -f3)

          case "${{ steps.bump.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "new_tag=${NEW_TAG}"         >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      # ── 3. Bump Cargo.toml version ────────────────────────────────────────────
      - name: Bump Cargo.toml version
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW="${{ steps.version.outputs.new_version }}"
          # Replace only the first `version = "..."` line (the package version)
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"${NEW}\"/}" Cargo.toml
          echo "Cargo.toml version set to ${NEW}"
          grep '^version' Cargo.toml

      # ── 4. Commit the version bump ───────────────────────────────────────────
      - name: Commit version bump
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore(release): bump version to ${NEW_TAG} [skip ci]"
          git push origin main
          echo "Version bump committed and pushed"

      # ── 5. Generate structured release notes ─────────────────────────────────
      - name: Generate release notes
        id: notes
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          PREV_TAG="${{ steps.bump.outputs.latest_tag }}"
          RANGE="${PREV_TAG}..HEAD"
          REPO="${{ github.repository }}"

          {
            echo "## What's Changed in ${NEW_TAG}"
            echo ""

            BREAKING=$(git log "$RANGE" --format="%s" | grep -E '^[a-z]+(\([^)]*\))?!:' | sed 's/^[^:]*: //' || true)
            [ -n "$BREAKING" ] && printf "### ⚠️ Breaking Changes\n" && \
              while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$BREAKING" && echo ""

            FEATS=$(git log "$RANGE" --format="%s" | grep -E '^feat(\([^)]*\))?:' | sed 's/^feat[^:]*: //' || true)
            [ -n "$FEATS" ] && printf "### ✨ New Features\n" && \
              while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$FEATS" && echo ""

            FIXES=$(git log "$RANGE" --format="%s" | grep -E '^fix(\([^)]*\))?:' | sed 's/^fix[^:]*: //' || true)
            [ -n "$FIXES" ] && printf "### 🐛 Bug Fixes\n" && \
              while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$FIXES" && echo ""

            SECURITY=$(git log "$RANGE" --format="%s" | grep -E '^security(\([^)]*\))?:' | sed 's/^security[^:]*: //' || true)
            [ -n "$SECURITY" ] && printf "### 🔐 Security\n" && \
              while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$SECURITY" && echo ""

            PERF=$(git log "$RANGE" --format="%s" | grep -E '^perf(\([^)]*\))?:' | sed 's/^perf[^:]*: //' || true)
            [ -n "$PERF" ] && printf "### ⚡ Performance\n" && \
              while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$PERF" && echo ""

            DOCS=$(git log "$RANGE" --format="%s" | grep -E '^docs(\([^)]*\))?:' | sed 's/^docs[^:]*: //' || true)
            [ -n "$DOCS" ] && printf "### 📚 Documentation\n" && \
              while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$DOCS" && echo ""

            echo "---"
            echo "**Full changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${NEW_TAG}"
            echo ""
            echo "### 📦 Install or upgrade"
            echo ""
            echo "\`\`\`powershell"
            echo "# Windows"
            echo "irm https://raw.githubusercontent.com/${REPO}/main/install/install.ps1 | iex"
            echo ""
            echo "# Or upgrade in-place"
            echo "gvm upgrade"
            echo "\`\`\`"
            echo ""
            echo "\`\`\`sh"
            echo "# Linux / macOS"
            echo "curl -fsSL https://raw.githubusercontent.com/${REPO}/main/install/install.sh | sh"
            echo ""
            echo "# Or upgrade in-place"
            echo "gvm upgrade"
            echo "\`\`\`"
          } > /tmp/release_notes.md

          cat /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      # ── 6. Tag and publish the GitHub Release ────────────────────────────────
      #
      # Creating the release here (not in release.yml) ensures the notes are
      # attached from the very start; release.yml will upload the binaries.
      - name: Create tag and GitHub Release
        if: steps.bump.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"

          git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
          git push origin "$NEW_TAG"

          gh release create "$NEW_TAG" \
            --repo "${{ github.repository }}" \
            --title "gvm ${NEW_TAG}" \
            --notes-file /tmp/release_notes.md \
            --latest \
            --verify-tag

          echo "✅ Release ${NEW_TAG} created - binaries will be uploaded by release.yml"

      - name: Skip message
        if: steps.bump.outputs.bump == 'none'
        run: echo "ℹ️ No releasable commits (only docs/chore/ci). Skipping version bump."
